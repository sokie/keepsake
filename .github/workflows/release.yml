name: Build and Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            artifact_name: keepsake-linux-amd64
            executable_name: keepsake
            archive_ext: tar.gz
          - os: windows-latest
            artifact_name: keepsake-windows-amd64
            executable_name: keepsake.exe
            archive_ext: zip
          - os: macos-15-intel
            artifact_name: keepsake-macos-intel
            executable_name: keepsake
            archive_ext: tar.gz
          - os: macos-15
            artifact_name: keepsake-macos-arm64
            executable_name: keepsake
            archive_ext: tar.gz

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Test
        run: npm test

      - name: Build frontend
        run: npm run build

      - name: Build single-file executable (Node SEA)
        run: node scripts/build-sea.mjs

      - name: Get version from tag
        id: get_version
        shell: bash
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Prepare release directory (Unix)
        if: runner.os != 'Windows'
        run: |
          mkdir -p release
          cp build/${{ matrix.executable_name }} release/
          cp LICENSE release/
          chmod +x release/${{ matrix.executable_name }}

      - name: Prepare release directory (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path release
          Copy-Item "build\${{ matrix.executable_name }}" -Destination "release\"
          Copy-Item "LICENSE" -Destination "release\"

      - name: Create archive (Unix)
        if: runner.os != 'Windows'
        run: |
          cd release
          tar -czvf ../${{ matrix.artifact_name }}-${{ steps.get_version.outputs.VERSION }}.${{ matrix.archive_ext }} *

      - name: Create archive (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          cd release
          Compress-Archive -Path * -DestinationPath "..\${{ matrix.artifact_name }}-${{ steps.get_version.outputs.VERSION }}.${{ matrix.archive_ext }}"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_name }}-${{ steps.get_version.outputs.VERSION }}.${{ matrix.archive_ext }}

  release:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Get version from tag
        id: get_version
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: Keepsake ${{ steps.get_version.outputs.VERSION }}
          draft: false
          prerelease: false
          generate_release_notes: true
          files: |
            artifacts/**/*
